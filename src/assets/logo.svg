<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#2d1560"/>
    </linearGradient>
    <linearGradient id="pageL" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="bshadow" x="-10%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <rect width="120" height="120" rx="26" fill="none" stroke="rgba(139,92,246,0.25)" stroke-width="1.5"/>

  <!-- Open book -->
  <g filter="url(#bshadow)">
    <!-- Left page: light (English source) -->
    <path d="M15 25 Q15 22 18 22 L56 24 L56 97 L18 99 Q15 99 15 96 Z" fill="url(#pageL)"/>
    <!-- Right page: dark purple (Japanese translation) -->
    <path d="M64 24 L102 22 Q105 22 105 25 L105 96 Q105 99 102 99 L64 97 Z" fill="url(#pageR)"/>
    <!-- Spine -->
    <rect x="54" y="21" width="12" height="79" rx="3" fill="url(#spine)"/>
  </g>

  <!-- Left page: text lines representing academic English text -->
  <rect x="20" y="33" width="30" height="2.5" rx="1.2" fill="#64748b" opacity="0.60"/>
  <rect x="20" y="40" width="33" height="2.5" rx="1.2" fill="#64748b" opacity="0.55"/>
  <rect x="20" y="47" width="26" height="2.5" rx="1.2" fill="#64748b" opacity="0.50"/>
  <rect x="20" y="54" width="31" height="2.5" rx="1.2" fill="#64748b" opacity="0.45"/>
  <rect x="20" y="61" width="23" height="2.5" rx="1.2" fill="#64748b" opacity="0.40"/>
  <rect x="20" y="68" width="29" height="2.5" rx="1.2" fill="#64748b" opacity="0.38"/>
  <rect x="20" y="75" width="19" height="2.5" rx="1.2" fill="#64748b" opacity="0.33"/>
  <rect x="20" y="82" width="27" height="2.5" rx="1.2" fill="#64748b" opacity="0.28"/>

  <!-- Right page: 読 kanji — the identity mark of Yomeru -->
  <text x="84.5" y="81"
    font-family="'Noto Sans JP','Yu Gothic','Hiragino Sans','Meiryo',sans-serif"
    font-weight="900"
    font-size="40"
    fill="#f5f3ff"
    text-anchor="middle"
    opacity="0.95">読</text>

  <!-- AI translation sparkle (teal, on dark right page) -->
  <g transform="translate(98, 29)">
    <path d="M0-6 L1.4-1.4 L6 0 L1.4 1.4 L0 6 L-1.4 1.4 L-6 0 L-1.4-1.4 Z" fill="#22d3ee"/>
    <circle cx="7.5" cy="-4.5" r="1.4" fill="#22d3ee" opacity="0.65"/>
    <circle cx="-5" cy="6.5" r="0.9" fill="#22d3ee" opacity="0.4"/>
  </g>
</svg>
